<!DOCTYPE html>
<html>

<head>
  <title>Thorana</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="icon" type="image/x-icon" href="images/athu.png" sizes="16x16">

  <style>
    .circle-container {
      position: fixed;
      top: 10%;
      left: 220px;
      transform: translateY(-50%);
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0.80;
    }

    .circle-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 1s ease;
      z-index: 1;
    }

    .circle-container img.active {
      opacity: 1;
      z-index: 2;
    }

    body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-color: #000;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('images/bgtest3.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      opacity: 0.2;
      z-index: -1;
    }

    #sound-icon {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 48px;
      cursor: pointer;
      color: #999;
      z-index: 9999;
      transition: transform 0.2s ease;
    }

    #sound-icon.active {
      color: #4caf50;
      transform: scale(1.2);
    }

    #myCanvas {
      position: relative;
      z-index: 1;
      display: block;
    }

    .logo-container {
      position: fixed;
      top: 4px;
      right: 230px;
      width: 175px;
      height: auto;
      z-index: 1001;
      opacity: 0.4;
    }

    .logo-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 768px) {
      .logo-container {
        right: 10px;
        top: 10px;
        width: 100px;
      }

      .circle-container {
        left: 50%;
        top: 80px;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 100px;
      }

      #sound-icon {
        font-size: 35px;
        bottom: 15px;
        right: 15px;
      }
    }

    /* --- Full Story Button Styles --- */
    #fullStoryBtn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      background-color: #FFD700; /* Gold color */
      color: #000; /* Black text */
      font-size: 16px; /* Size for the main Sinhala text */
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 1005;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
      transition: background-color 0.3s, transform 0.2s;
      text-align: center; /* Centers both lines of text */
      line-height: 1.3;   /* Controls the space between the two lines */
    }

    /* Styles specifically for the English subtitle */
    #fullStoryBtn span {
      font-size: 12px;     /* Makes the English text smaller */
      font-weight: normal; /* Removes bolding from the English text */
      opacity: 0.8;        /* Makes it slightly softer than the main text */
    }

    #fullStoryBtn:hover {
      background-color: #ffcc00;
      transform: scale(1.05);
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      #fullStoryBtn {
        top: 60px; 
        right: 15px;
        font-size: 14px; /* Slightly smaller Sinhala for mobile */
        padding: 8px 16px;
      }
      #fullStoryBtn span {
        font-size: 10px; /* Slightly smaller English for mobile */
      }
    }
  </style>
</head>

<body style="margin: 0; ">

  <div id="sound-icon">🔇</div>

  <audio id="my-audio" loop autoplay muted>
    <source src="audio/mix.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <div class="circle-container" id="circleContainer" style="display: none;">
    <img src="images/a1.gif" id="ImageHolder1">
    <img src="images/a2.gif" id="ImageHolder2">
    <img src="images/a3.gif" id="ImageHolder3">
    <img src="images/a4.gif" id="ImageHolder4">
    <img src="images/a5.gif" id="ImageHolder5">
    <img src="images/a6.gif" id="ImageHolder6">
    <img src="images/a7.gif" id="ImageHolder7">
    <img src="images/a8.gif" id="ImageHolder8">
  </div>

  <div id="sound-icon">🔇</div>
  
  <button id="fullStoryBtn">සම්පූර්න කතාව <br> <span>Full Story</span></button>

  <canvas style="width: 100vw; height: 100vh; object-fit: contain;" id="myCanvas">
    Your browser not supported. please try with a different device.
  </canvas>

  <script>

    // Make the full story button work
    document.getElementById("fullStoryBtn").addEventListener("click", function() {
      // Replace the URL below with the link to your full story
      window.location.href = "pages/page1.html"; 
    });


    const audio = document.getElementById("my-audio");
    const icon = document.getElementById("sound-icon");
    const circleContainer = document.getElementById("circleContainer");

    const timeToImageMap = [
      { start: 0.00, end: 150.00, id: "ImageHolder1" },
      { start: 151.00, end: 198.00, id: "ImageHolder2" },
      { start: 199.00, end: 240.00, id: "ImageHolder3" },
      { start: 241.00, end: 307.00, id: "ImageHolder4" },
      { start: 308.00, end: 417.00, id: "ImageHolder5" },
      { start: 418.00, end: 514.00, id: "ImageHolder6" },
      { start: 515.00, end: 570.00, id: "ImageHolder7" },
      { start: 571.00, end: 710.00, id: "ImageHolder8" },
    ];

    let currentActiveId = null;

    function showImageForTime(currentTime) {
      for (let entry of timeToImageMap) {
        if (currentTime >= entry.start && currentTime <= entry.end) {
          if (currentActiveId !== entry.id) {
            timeToImageMap.forEach(e => {
              const img = document.getElementById(e.id);
              img.classList.remove("active");
            });

            const activeImg = document.getElementById(entry.id);
            activeImg.classList.add("active");
            currentActiveId = entry.id;
          }
          return;
        }
      }
    }

    window.addEventListener("load", () => {
      audio.play().catch(err => console.log("Autoplay blocked:", err));
    });

    icon.addEventListener("click", () => {
      if (audio.muted || audio.paused) {
        audio.muted = false;
        audio.play();
        icon.classList.add("active");
        icon.textContent = "🔊";
        circleContainer.style.display = "flex";
      } else {
        audio.muted = true;
        audio.pause();
        icon.classList.remove("active");
        icon.textContent = "🔇";
        circleContainer.style.display = "none";
      }
    });

    audio.addEventListener("timeupdate", () => {
      showImageForTime(audio.currentTime);
    });

    window.addEventListener("orientationchange", function () {
      setTimeout(function () { location.reload(); }, 300);
    });

    if (!sessionStorage.getItem('welcomeShown')) {
      sessionStorage.setItem('welcomeShown', 'true');
      window.location.href = "welcome.html";
    }

    var ww = window.innerWidth;
    var hw = window.innerHeight;
    var myCanvas, context;
    var w, h, r, R, z, marginTop, marginBotom;
    var cx = new Array();
    var cy = new Array();
    var pointSqx, pointSqy, dimPointSqx, dimPointSqy;
    var fractionOfDispSmall, fractionOfDispLarge;
    var angleBC;
    var leftImgBoxStartX, leftImgBoxStartY, rightImgBoxStartX, rightImgBoxStartY;
    var leftImageBoxW, leftImageBoxH, rightImgBoxW, rightImgBoxH;
    var imageBoxPadding;

    window.onload = function () {
      myCanvas = document.getElementById('myCanvas');
      w = myCanvas.width = ww;
      h = myCanvas.height = ww / 2;
      context = myCanvas.getContext("2d");

      function fullscreen() {
        var elem = document.documentElement; // මුළු පිටුවම Full Screen කරයි

        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { /* Safari/Chrome වලට */
          elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) { /* Edge/IE වලට */
          elem.msRequestFullscreen();
        }
      }
      myCanvas.addEventListener("click", fullscreen);

      marginTop = 0.12;
      marginBotom = 0.1;

      var k = 2.21 * Math.sqrt(2) - 1;
      r = ((1 - (marginTop + marginBotom)) / 4) * (1 / (k + 2)) * w;
      R = k * r;

      cx[0] = w / 2;
      cy[0] = (h / 2) * (1 + marginTop - marginBotom);

      var gap = r * 0.478;
      var distanceToCenter = R + r + gap;

      for (var i = 0; i <= 7; i++) { cx[i + 1] = cx[0] + distanceToCenter * Math.sin(i * (Math.PI / 4)); }
      for (var i = 0; i <= 7; i++) { cy[i + 1] = cy[0] + distanceToCenter * Math.cos(i * (Math.PI / 4)); }

      pointSqx = cx[0] - (R + 3 * r);
      pointSqy = (cy[0] + r) + (distanceToCenter / Math.sqrt(2));
      dimPointSqx = 6 * r + 2 * R;
      dimPointSqy = 0.98 * h - pointSqy;

      // Loading all Images
      const downImage = new Image(); downImage.src = "images/thorana1 (2).png";
      const imageCenter = new Image(); imageCenter.src = "images/budda.webp";
      const imageMakaraleft = new Image(); imageMakaraleft.src = 'images/pilr.png';
      const imageMakaraRight = new Image(); imageMakaraRight.src = 'images/pil.png';
      const image1 = new Image(); image1.src = "images/aa1.png";
      const image2 = new Image(); image2.src = "images/aa2.png";
      const image3 = new Image(); image3.src = "images/aa3.png";
      const image4 = new Image(); image4.src = "images/aa4.jpg";
      const image5 = new Image(); image5.src = "images/aa5.png";
      const image6 = new Image(); image6.src = "images/aa6.png";
      const image7 = new Image(); image7.src = "images/aa7.png";
      const image8 = new Image(); image8.src = "images/aa8.png";

      var dim = 2 * R * Math.sin(Math.atan(0.5));
      var makara_height = 152;
      var makara_width = makara_height * 2;

      imageBoxPadding = 0.01 * h;
      var d = (r - cy[1] + cy[8]) / r;
      angleBC = Math.acos(d);
      leftImgBoxStartX = pointSqx + imageBoxPadding;
      leftImgBoxStartY = pointSqy + imageBoxPadding;
      leftImageBoxH = dimPointSqy - 2 * imageBoxPadding;
      leftImageBoxW = R + 3 * r - r * Math.sin(angleBC) - 2 * imageBoxPadding;
      rightImgBoxStartX = cx[0] + r * Math.sin(angleBC) + imageBoxPadding;
      rightImgBoxStartY = cy[1] + r * Math.cos(angleBC) + imageBoxPadding;
      rightImgBoxH = leftImageBoxH;
      rightImgBoxW = leftImageBoxW;

      fractionOfDispSmall = 0.6;
      fractionOfDispLarge = 0.1;

      var dotSize = 0.003 * w;
      var dotSizeMedium = 0.75 * dotSize;
      var flowerCenterDotSize = 0.004 * w;

      var lightingModes = ["rainbowWave", "pulse", "colorBands", "sparkle", "chase", "meteor", "ripple", "gradientSpin", "solarFlare", "binaryTwinkle", "spiralOrbit", "breathingAurora", "neonTunnel", "glitchFlash", "plasmaRipple", "fireflyDance", "digitalRain", "galaxySwirl", "scannerSweep", "bubbleRise", "syncBlast"];
      var currentModeIndex = 0;
      setInterval(() => { currentModeIndex = (currentModeIndex + 1) % lightingModes.length; }, 10000);

      var dotsForSmallCircle = { numberOfDots: [35, 35, 76], radii: [0.7, 0.8, 0.9] };
      var ringPatterns = ["rainbow", "chase", "twinkle"];

      var sequencePatterns = ["rainbow", "wave", "pulse", "chase", "comet", "twinkle"];
      var currentSequenceIndex = 0;

      function updateRingPatternsSequentially() {

        for (let i = 0; i < ringPatterns.length; i++) {
          ringPatterns[i] = sequencePatterns[currentSequenceIndex];
        }


        currentSequenceIndex++;


        if (currentSequenceIndex >= sequencePatterns.length) {
          currentSequenceIndex = sequencePatterns.length - 1;
         
          currentSequenceIndex = 0;
        }
      }
      setInterval(updateRingPatternsSequentially, 6000);

      var numberOfDotsEach = { line: [, 16, , 30, , 45, , 60] };

      // --- Animation Drawing Functions ---

      var drawRadialDotGrid = function (frameCount) {
        var numRays = 8;
        var dotsPerRay = 8;
        var startDist = R * 1.15;
        var endDist = R * 1.75;
        for (var i = 0; i < numRays; i++) {
          var angle = (2 * Math.PI / numRays) * i + (Math.PI / numRays);
          for (var j = 0; j < dotsPerRay; j++) {
            var pulse = Math.sin(frameCount * 0.15 - j * 0.4);
            var opacity = pulse > 0.5 ? 1.0 : 0.2;
            var dist = startDist + (j / (dotsPerRay - 1)) * (endDist - startDist);
            var x = cx[0] + dist * Math.cos(angle);
            var y = cy[0] + dist * Math.sin(angle);
            var hue = 200 + (j * 15);
            context.beginPath();
            context.fillStyle = `hsla(${hue}, 100%, 60%, ${opacity})`;
            context.arc(x, y, dotSizeMedium * 1.2, 0, Math.PI * 2);
            context.fill();
            context.closePath();
          }
        }
      };


      // =========================
      // NEW: Triangle Dot Pattern 
      // =========================
      var filTriangle = function () {
        var timeOffset = Date.now() * 0.002;
        var dotNumbers = [4, 3, 3, 2, 2, 1]; // තිත් විහිදෙන ප්‍රමාණයන්
        var fr = 0.1; // පරතරය

        var outShift = 1.4;

        for (var i = 1; i < 7; i++) {

          var plotAngle = (1 + 2 * i) * Math.PI / 8;

          for (var i4 = -3; i4 < 3; i4++) {
            // (1 + fr * i4) වෙනුවට අලුත් (outShift + fr * i4) යොදා ඇත
            let pointX = cx[0] + R * (outShift + fr * i4) * Math.sin(plotAngle);
            let pointY = cy[0] + R * (outShift + fr * i4) * Math.cos(plotAngle);

            let hue = ((i * 45) + (i4 * 20) + timeOffset * 50) % 360;
            let alpha = 0.4 + 0.6 * Math.sin(timeOffset + i4);
            context.fillStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;

            context.beginPath();
            context.arc(pointX, pointY, dotSizeMedium, 0, Math.PI * 2, false);
            context.fill();
            context.closePath();

            // ත්‍රිකෝණයක හැඩයට දෙපසට විහිදෙන තිත්
            for (var k = 0; k < dotNumbers[i4 + 3]; k++) {
              var newAngle1 = plotAngle + k * Math.PI / 36;
              var x1 = cx[0] + R * (outShift + fr * i4) * Math.sin(newAngle1);
              var y1 = cy[0] + R * (outShift + fr * i4) * Math.cos(newAngle1);

              context.fillStyle = `hsla(${(hue + 20) % 360}, 100%, 60%, ${alpha})`;
              context.beginPath();
              context.arc(x1, y1, dotSizeMedium, 0, Math.PI * 2, false);
              context.fill();
              context.closePath();

              var newAngle2 = plotAngle - k * Math.PI / 36;
              var x2 = cx[0] + R * (outShift + fr * i4) * Math.sin(newAngle2);
              var y2 = cy[0] + R * (outShift + fr * i4) * Math.cos(newAngle2);

              context.fillStyle = `hsla(${(hue - 20) % 360}, 100%, 60%, ${alpha})`;
              context.beginPath();
              context.arc(x2, y2, dotSizeMedium, 0, Math.PI * 2, false);
              context.fill();
              context.closePath();
            }
          }
        }
      };

      // ==========================
      // NEW: Center Flower Pattern 
      // ==========================
      var centerCircleFlowerPattern = function () {
        var timeOffset = Date.now() * 0.001;

        var flowerCenter = 1.43 * R;
        var countOuterFlowers = 8;
        var flowerLevel1FormCenter = 0.028 * w;
        var flowerCenterDotSize = 0.009 * w;
        var flowerOuterDotSize = 0.008 * w;

        for (var i1 = 0; i1 < 8; i1++) {

          if (i1 !== 2) continue; //

          var flowerCenterAngle = Math.PI / 4 * i1;
          var flowerX = cx[0] + flowerCenter * Math.cos(flowerCenterAngle);
          var flowerY = cy[0] + flowerCenter * Math.sin(flowerCenterAngle);

          var centerPulse = Math.sin(timeOffset * 1.5 + i1 * 0.5) * 0.3 + 0.7;
          var centerHue = (i1 * 45 + timeOffset * 30) % 360;

          context.beginPath();
          context.fillStyle = "hsla(" + centerHue + ", 100%, 70%, " + (0.7 + 0.3 * Math.sin(timeOffset + i1)) + ")";
          context.arc(flowerX, flowerY, flowerCenterDotSize * centerPulse, 0, Math.PI * 2, false);
          context.fill();
          context.closePath();

          for (var i2 = 0; i2 < countOuterFlowers; i2++) {
            var flowerOuterDotAngle = flowerCenterAngle + 2 * Math.PI / countOuterFlowers * i2;
            var petalDistance = flowerLevel1FormCenter * (1 + 0.2 * Math.sin(timeOffset * 2 + i2 * 0.7));

            var level2posX = flowerX + petalDistance * Math.cos(flowerOuterDotAngle);
            var level2posY = flowerY + petalDistance * Math.sin(flowerOuterDotAngle);

            var petalHue = (centerHue + 180 + i2 * 10) % 360;

            context.beginPath();
            context.strokeStyle = "hsla(" + petalHue + ", 100%, 50%, 0.3)";
            context.lineWidth = 1.5;
            context.moveTo(flowerX, flowerY);
            context.lineTo(level2posX, level2posY);
            context.stroke();
            context.closePath();

            context.beginPath();
            context.fillStyle = "hsla(" + petalHue + ", 100%, 50%, " + (0.5 + 0.5 * Math.sin(timeOffset + i2 * 0.3)) + ")";
            context.arc(
              level2posX,
              level2posY,
              flowerOuterDotSize * (0.8 + 0.4 * Math.sin(timeOffset * 1.5 + i2)),
              0,
              Math.PI * 2,
              false
            );
            context.fill();
            context.closePath();
          }
        }
      };

      var drawInnerCirclePattern = function (frameCount, time) {
        for (var k = 0; k < dotsForSmallCircle.radii.length; k++) {
          let mode = ringPatterns[k];
          for (var j = 1; j < cx.length; j++) {
            if (j === 1) continue;
            for (var i = 0; i < dotsForSmallCircle.numberOfDots[k]; i++) {
              let angle = (2 * Math.PI / dotsForSmallCircle.numberOfDots[k]) * i;
              let maxCosSin = Math.max(Math.abs(Math.cos(angle)), Math.abs(Math.sin(angle)));
              let localX = r * dotsForSmallCircle.radii[k] * (Math.cos(angle) / maxCosSin);
              let localY = r * dotsForSmallCircle.radii[k] * (Math.sin(angle) / maxCosSin);

              if (j === 3 || j === 5 || j === 7) {
                let rotAngle = 45 * Math.PI / 180;
                let rx = localX * Math.cos(rotAngle) - localY * Math.sin(rotAngle);
                let ry = localX * Math.sin(rotAngle) + localY * Math.cos(rotAngle);
                localX = rx; localY = ry;
              }

              let dotX = cx[j] + localX;
              let dotY = cy[j] + localY;
              let color;
              let size = dotSizeMedium;

              switch (mode) {
                case "rainbow": color = `hsl(${(i * 360 / dotsForSmallCircle.numberOfDots[k] + frameCount * 2) % 360}, 100%, 60%)`; break;
                case "wave": let group = Math.floor((i + frameCount / 10) / 5) % 3; color = group === 0 ? "rgba(255, 50, 50, 1)" : (group === 1 ? "rgba(50, 255, 50, 1)" : "rgba(50, 50, 255, 1)"); break;
                case "pulse": let pulse = 0.5 + 0.5 * Math.sin((time + i * 100) / 300); color = i % 2 === 0 ? `rgba(255, 255, 0, ${pulse})` : `rgba(255, 0, 255, ${pulse})`; break;
                case "chase": let distance = Math.abs(i - ((frameCount * 0.2) % dotsForSmallCircle.numberOfDots[k])); color = distance < 5 ? `rgba(0, 255, 180, ${1 - (distance / 5)})` : `rgba(0, 100, 80, 0.2)`; break;
                case "twinkle": color = Math.random() > 0.1 ? "rgba(255, 255, 255, 1)" : "rgba(200, 200, 255, 0.2)"; break;
                case "comet": let cometDist = Math.abs(i - ((frameCount * 0.3) % dotsForSmallCircle.numberOfDots[k])); color = cometDist < 8 ? `rgba(255, 255, 200, ${1 - (cometDist / 8)})` : "rgba(100, 100, 150, 0.1)"; break;
                default: color = `rgba(255, 255, 255, 15)`;
              }

              context.beginPath();
              context.fillStyle = color;
              context.arc(dotX, dotY, size, 0, 2 * Math.PI, false);
              context.fill();
              context.closePath();
            }
          }
        }
      };

      var centerCircleFillerPattern = function (frameCount, time) {
        let lightingMode = lightingModes[currentModeIndex];
        for (var i4 = 0; i4 < numberOfDotsEach.line.length; i4++) {
          for (var i3 = 0; i3 < numberOfDotsEach.line[i4]; i3++) {
            var plotAngle = 2 * Math.PI / numberOfDotsEach.line[i4] * i3;
            if (plotAngle > Math.PI / 4 && plotAngle < Math.PI / 4 * 3) continue;

            var localR = (2 + i4) * fractionOfDispLarge * R;
            var dotX = cx[0] + localR * Math.cos(plotAngle);
            var dotY = cy[0] + localR * Math.sin(plotAngle);
            let color;

            switch (lightingMode) {
              case "pulse": let pulse = 0.4 + 0.4 * Math.sin(time / 500 + i4 * 0.5 + i3 * 0.05); color = `hsla(${(frameCount * 0.5 + i4 * 20) % 360}, 100%, 60%, ${pulse})`; break;
              case "ripple": let centerDist = Math.sqrt(Math.pow(dotX - cx[0], 2) + Math.pow(dotY - cy[0], 2)); let ripplePos = ((frameCount * 2) % 100) / 100 * R * 0.8; let rippleDist = Math.abs(centerDist - ripplePos); if (rippleDist < R * 0.1) { let intensity = 1 - rippleDist / (R * 0.1); color = `rgba(0, ${150 * intensity}, 255, ${intensity})`; } else { color = 'rgba(0, 50, 100, 0.2)'; } break;
              case "bubbleRise": let bubblePos = (frameCount * 0.4 + i4 * 10) % numberOfDotsEach.line[i4]; let dist = i3 - bubblePos; if (dist > -3 && dist < 0) { let intensity = 1 + dist / 3; color = `rgba(0, 255, 255, ${intensity})`; } else { color = 'rgba(10, 30, 50, 0.05)'; } break;
              default: color = `hsl(${(frameCount * 0.5 + i4 * 20) % 360}, 100%, 60%)`;
            }

            context.beginPath();
            context.fillStyle = color;
            let currentDotSize = flowerCenterDotSize;
            if (lightingMode === "sparkle" && color.includes('255, 255, 255')) currentDotSize *= 1.5 + Math.random();
            else if (["chase", "meteor", "ripple"].includes(lightingMode)) currentDotSize *= 1.2;

            context.arc(dotX, dotY, currentDotSize, 0, 2 * Math.PI, false);
            context.fill();
            context.closePath();
          }
        }
      };

      let lineFrameCount = 0;
      function drawAnimatedDiagonalLine() {

        const startX = cx[7] + r;
        const startY = cy[7] + r;
        const endX = cx[0] - R;
        const endY = cy[0] - (R / 1.5);

        const numDots = 8;
        const currentDotSize = 5;
        let activeDot = Math.floor(lineFrameCount / 10) % numDots;

        for (let i = 0; i < numDots; i++) {
          let x = startX + (endX - startX) * (i / (numDots - 1));
          let y = startY + (endY - startY) * (i / (numDots - 1));
          let opacity = (i === activeDot) ? 1.0 : 0.1;

          context.beginPath();
          context.fillStyle = `rgba(204, 51, 255, ${opacity})`;
          context.arc(x, y, currentDotSize, 0, Math.PI * 2);
          context.fill();
          context.closePath();
        }
        lineFrameCount++;
      }

      var drawGapFillers = function (rayFrameCount) {
        var numRays = 16;
        var dotsPerRay = 8;
        var startR = R * 0.95;
        var endR = distanceToCenter - (r * 1.2);
        var stepR = (endR - startR) / dotsPerRay;

        for (var i = 0; i < numRays; i++) {
          var angle = (Math.PI * 2 / numRays) * i + (Math.PI / 16);
          for (var j = 0; j < dotsPerRay; j++) {
            var currentR = startR + (stepR * j);
            var dotX = cx[0] + currentR * Math.cos(angle);
            var dotY = cy[0] + currentR * Math.sin(angle);
            var phase = (rayFrameCount * 2 - j * 10) % 360;
            var hue = (i * 22.5 + rayFrameCount) % 360;
            var alpha = (Math.sin(phase * Math.PI / 180) + 1) / 2;

            context.beginPath();
            context.fillStyle = `hsla(${hue}, 100%, 60%, ${0.1 + alpha * 0.9})`;
            context.arc(dotX, dotY, dotSizeMedium * 1.5, 0, Math.PI * 2);
            context.fill();
            context.closePath();
          }
        }
      };

      // === MAIN ANIMATION LOOP ===
      let frameCount = 0;

      function mainAnimate() {
        context.clearRect(0, 0, w, h);
        let time = Date.now();

        // 1. Draw Base Geometric Shapes
        for (var i = 0; i < cx.length; i++) {
          if (i === 1) continue;
          context.save();
          context.translate(cx[i], cy[i]);
          if (i === 3 || i === 5 || i === 7) { context.rotate(45 * Math.PI / 180); }

          context.beginPath();
          // context.strokeStyle = "#FFD700";
          context.fillStyle = "rgba(0,0,0,1)";
          context.lineWidth = 5;
          if (i == 0) {
            context.arc(0, 0, R, Math.PI * 2, false);
          } else {
            context.rect(-r, -r, r * 2, r * 2);
          }
          context.stroke();
          context.fill();
          context.closePath();
          context.restore();
        }

        // 2. Draw Light Patterns
        drawRadialDotGrid(frameCount);
        drawInnerCirclePattern(frameCount, time);
        centerCircleFillerPattern(frameCount, performance.now());
        drawAnimatedDiagonalLine();
        drawGapFillers(frameCount);

        // drawGapPetals();

        filTriangle();
        centerCircleFlowerPattern();

        // 3. Draw Images (Only if they are loaded)
        if (downImage.complete && downImage.naturalWidth !== 0) {
          context.imageSmoothingEnabled = true;
          context.imageSmoothingQuality = 'high';
          context.drawImage(downImage, leftImgBoxStartX, leftImgBoxStartY, R * 2.01 + 6.05 * r - imageBoxPadding * 2, rightImgBoxH);
        }

        if (imageMakaraleft.complete && imageMakaraleft.naturalWidth !== 0) context.drawImage(imageMakaraleft, pointSqx - makara_width, pointSqy, makara_width, makara_height);
        if (imageMakaraRight.complete && imageMakaraRight.naturalWidth !== 0) context.drawImage(imageMakaraRight, pointSqx + dimPointSqx, pointSqy, makara_width, makara_height);

        if (image1.complete && image1.naturalWidth !== 0) context.drawImage(image1, cx[8] - r * fractionOfDispSmall, cy[8] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        //if (image2.complete && image2.naturalWidth !== 0) context.drawImage(image2, cx[7] - r * fractionOfDispSmall, cy[7] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        if (image3.complete && image3.naturalWidth !== 0) context.drawImage(image3, cx[6] - r * fractionOfDispSmall, cy[6] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        //if (image4.complete && image4.naturalWidth !== 0) context.drawImage(image4, cx[5] - r * fractionOfDispSmall, cy[5] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        if (image5.complete && image5.naturalWidth !== 0) context.drawImage(image5, cx[4] - r * fractionOfDispSmall, cy[4] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        //if (image6.complete && image6.naturalWidth !== 0) context.drawImage(image6, cx[3] - r * fractionOfDispSmall, cy[3] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        if (image7.complete && image7.naturalWidth !== 0) context.drawImage(image7, cx[2] - r * fractionOfDispSmall, cy[2] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        
        // Draw Center Image (Buddha) last so it stays on top
        if (imageCenter.complete && imageCenter.naturalWidth !== 0) {
          context.drawImage(imageCenter, cx[0] - R * Math.sin(Math.PI / 6) - w * 0.00365, cy[0] - 0.019 * w, dim + 0.018 * w, dim + 0.015 * w);
        }

        frameCount++;
        requestAnimationFrame(mainAnimate);


        if (image1.complete && image1.naturalWidth !== 0) context.drawImage(image1, cx[8] - r * fractionOfDispSmall, cy[8] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        
        // Rotated Image 2
        if (image2.complete && image2.naturalWidth !== 0) {
          context.save();
          context.translate(cx[7], cy[7]);
          context.rotate(45 * Math.PI / 180);
          context.drawImage(image2, -r * fractionOfDispSmall, -r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
          context.restore();
        }
        
        if (image3.complete && image3.naturalWidth !== 0) context.drawImage(image3, cx[6] - r * fractionOfDispSmall, cy[6] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        
        // Rotated Image 4
        if (image4.complete && image4.naturalWidth !== 0) {
          context.save();
          context.translate(cx[5], cy[5]);
          context.rotate(45 * Math.PI / 180);
          context.drawImage(image4, -r * fractionOfDispSmall, -r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
          context.restore();
        }
        
        if (image5.complete && image5.naturalWidth !== 0) context.drawImage(image5, cx[4] - r * fractionOfDispSmall, cy[4] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        
        // Rotated Image 6
        if (image6.complete && image6.naturalWidth !== 0) {
          context.save();
          context.translate(cx[3], cy[3]);
          context.rotate(45 * Math.PI / 180);
          context.drawImage(image6, -r * fractionOfDispSmall, -r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
          context.restore();
        }
        
        if (image7.complete && image7.naturalWidth !== 0) context.drawImage(image7, cx[2] - r * fractionOfDispSmall, cy[2] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
      }

      // Start the main loop
      mainAnimate();
    }
  </script>
