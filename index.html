<!DOCTYPE html>
<html>

<head>
  <title>Digital-Thorana</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  
  <link rel="icon" type="image/x-icon" href="images/athu.png" sizes="16x16">

  <style>
    body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-color: #000;
      position: relative;
    }

    /* Replaces your body::before */
    .bg-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* Ensures the video covers the screen without stretching */
      opacity: 0.2;
      /* Keeps your desired 20% opacity */
      z-index: -1;
      /* Pushes the video behind your content */
      pointer-events: none;
      /* Prevents users from accidentally right-clicking the video */
    }

    /* Example to ensure your foreground content stays on top */
    .content {
      z-index: 1;
    }

    #sound-icon {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 48px;
      cursor: pointer;
      color: #999;
      z-index: 9999;
      transition: transform 0.2s ease;
    }

    #sound-icon.active {
      color: #4caf50;
      transform: scale(1.2);
    }

    #myCanvas {
      position: relative;
      z-index: 1;
      display: block;
    }

    .logo-container {
      position: fixed;
      top: 4px;
      right: 230px;
      width: 175px;
      height: auto;
      z-index: 1001;
      opacity: 0.4;
    }

    .logo-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 768px) {
      .logo-container {
        right: 10px;
        top: 10px;
        width: 100px;
      }

      

      #sound-icon {
        font-size: 20px;
        bottom: 15px;
        right: 15px;
      }
    }

    /* --- Full Story Button Styles --- */
    /* --- Full Story Button Styles (Glass Effect) --- */
    #fullStoryBtn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      
      /* Glassmorphism Background */
      background: rgba(255, 255, 255, 0.1); /* අර්ධ පාරදෘශ්‍ය (Semi-transparent) සුදු */
      backdrop-filter: blur(12px); /* පිටුපස බොඳ කරන effect එක */
      -webkit-backdrop-filter: blur(12px); /* Safari බ්‍රව්සරය සඳහා */
      
      /* Glass Border & Shadow */
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      
      /* Text Colors & Shadow (පිටුපස වීදුරුවක් නිසා අකුරු පැහැදිලිව පේන්න) */
      color: #ffffff; 
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
      
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      z-index: 1005;
      transition: all 0.3s ease;
      text-align: center;
      line-height: 1.3;
    }

    /* Styles specifically for the English subtitle */
    #fullStoryBtn span {
      font-size: 12px;
      font-weight: normal;
      color: #FFD700; /* English අකුරු වලට ලස්සන කහ/රන්වන් පාටක් */
      opacity: 0.9;
    }

    /* Hover Effect */
    #fullStoryBtn:hover {
      background: rgba(255, 255, 255, 0.25); /* මවුස් එක ගෙනිච්චම එළිය ටිකක් වැඩි වෙනවා */
      transform: scale(1.05);
      border: 1px solid rgba(255, 215, 0, 0.6); /* border එක රන්වන් පාට වෙනවා */
      box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
    }

    /* Mobile Responsive Adjustments */
    @media (max-width: 768px) {
      #fullStoryBtn {
        top: 60px; /* ෆෝන් එකේ උඩින් තියෙන අනිත් අයිකන් එක්ක හැප්පෙන්නේ නැති වෙන්න පල්ලෙහාට ගෙන ඇත */
        right: 15px;
        font-size: 14px;
        padding: 8px 16px;
      }

      #fullStoryBtn span {
        font-size: 10px;
      }
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      #fullStoryBtn {
        top: 60px;
        right: 15px;
        font-size: 14px;
        /* Slightly smaller Sinhala for mobile */
        padding: 8px 16px;
      }

      #fullStoryBtn span {
        font-size: 10px;
        /* Slightly smaller English for mobile */
      }

      .close-btn {
        top: 15px;
        right: 20px;
        width: 30px; /* අයිකනය මඳක් කුඩා කිරීම */
        height: 30px;
        font-size: 14px;
      }
    }

    /* --- Loading Screen --- */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #FFD700;
      font-family: sans-serif;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 215, 0, 0.3);
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* --- Close Button Styles --- */
    .close-btn {
      position: absolute; /* Modal එක ඇතුළේ පිහිටන්න absolute දීම වඩා හොඳයි */
      top: 20px;
      right: 30px;
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #ff5555, #cc1a1a);
      color: #fff;
      border: none; 
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer; 
      z-index: 1000000;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
    }

    .close-btn:hover {
      transform: scale(1.1) rotate(90deg);
      background: #ff2222;
    }
  </style>
</head>

<body style="margin: 0; ">

  <div id="loader">
    <div class="spinner"></div>
    <h3>තොරණ සූදානම් වෙමින් පවතී...</h3>
  </div>

  <div style="display: none;">
    <img id="img-down" src="images/down.webp">
    <img id="img-center" src="images/budda.webp">
    <img id="img-1" src="images/aa1.webp">
    <img id="img-2" src="images/aa2.webp">
    <img id="img-3" src="images/aa3.webp">
    <img id="img-4" src="images/aa4.webp">
    <img id="img-5" src="images/aa5.webp">
    <img id="img-6" src="images/aa7.webp">
    <img id="img-7" src="images/aa8.webp">
  </div>

  <video autoplay loop muted playsinline class="bg-video" id="bgVideo"></video>


  <div id="sound-icon">🔇</div>

  <audio id="my-audio" loop>
    <source src="audio/mix.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <button id="fullStoryBtn">සම්පූර්න කතාව <br> <span>Full Story</span></button>

  <canvas style="width: 100vw; height: 100vh; object-fit: contain;" id="myCanvas">
    Your browser not supported. please try with a different device.
  </canvas>


  <div id="storyModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 999999;">
    <button id="closeStoryBtn" class="close-btn">&#10006;</button>
    
    <iframe src="" id="storyFrame" style="width: 100%; height: 100%; border: none;"></iframe>
  </div>

  <script>

  // Full Story බොත්තම සින්දුව නතර නොවී වැඩ කිරීමට අදාළ කොටස
    const storyModal = document.getElementById("storyModal");
    const storyFrame = document.getElementById("storyFrame");

    document.getElementById("fullStoryBtn").addEventListener("click", function () {
      storyFrame.src = "test/page1.html"; // කතා පිටුව පසුබිමේ ප්ලේ වන අතරතුර රාමුවට ලෝඩ් කරයි
      storyModal.style.display = "block";  // මුළු තිරයම වැහෙන සේ Overlay එක පෙන්වයි
    });

    // නැවත තොරණට යාමේ බොත්තම ක්‍රියාත්මක කිරීම
    document.getElementById("closeStoryBtn").addEventListener("click", function () {
      storyModal.style.display = "none";  // Overlay එක හංගයි
      storyFrame.src = "";                // ඉඩ ඉතිරි කරගැනීමට iframe එක Clear කරයි
    });

   
    const audio = document.getElementById("my-audio");
    const icon = document.getElementById("sound-icon");
   
    icon.addEventListener("click", () => {
      if (audio.muted || audio.paused) {
        audio.muted = false;
        audio.play();
        icon.classList.add("active");
        icon.textContent = "🔊";
      } else {
        audio.muted = true;
        audio.pause();
        icon.classList.remove("active");
        icon.textContent = "🔇";
      }
    });

    // --- Mobile Audio Fix (පළමු Touch එකේදීම සින්දුව ප්ලේ වීම) ---
    function unlockAudioOnFirstTouch() {
      if (audio.muted || audio.paused) {
        audio.muted = false;
        audio.play().then(() => {
          // සින්දුව ප්ලේ වුණාම අයිකන් එකත් 🔊 විදිහට මාරු කරනවා
          icon.classList.add("active");
          icon.textContent = "🔊";
        }).catch(err => console.log("Audio Error:", err));
      }
      
      // මේක එක පාරක් ප්ලේ වුණාට පස්සේ, මේ Event එක අයින් කරලා දානවා
      // (නැත්නම් තිරය අල්ලන අල්ලන සැරේට මේක වැඩ කරන්න ගන්නවා)
      document.body.removeEventListener("touchstart", unlockAudioOnFirstTouch);
      document.body.removeEventListener("click", unlockAudioOnFirstTouch);
    }

    // තිරය Touch කරන හෝ Click කරන පළමු අවස්ථාවේදීම ක්‍රියාත්මක වීමට
    document.body.addEventListener("touchstart", unlockAudioOnFirstTouch, { once: true });
    document.body.addEventListener("click", unlockAudioOnFirstTouch, { once: true });
    // -------------------------------------------------------------

    window.addEventListener("orientationchange", function () {
      setTimeout(function () { location.reload(); }, 300);
    });

    var ww = window.innerWidth;
    var hw = window.innerHeight;
    var myCanvas, context;
    var w, h, r, R, z, marginTop, marginBotom;
    var cx = new Array();
    var cy = new Array();
    var pointSqx, pointSqy, dimPointSqx, dimPointSqy;
    var fractionOfDispSmall, fractionOfDispLarge;
    var angleBC;
    var leftImgBoxStartX, leftImgBoxStartY, rightImgBoxStartX, rightImgBoxStartY;
    var leftImageBoxW, leftImageBoxH, rightImgBoxW, rightImgBoxH;
    var imageBoxPadding;

   window.onload = function () {
      document.getElementById('loader').style.display = 'none';
      myCanvas = document.getElementById('myCanvas');
      
      var wh = window.innerHeight;
      w = ww;
      
      var isMobile = ww < 768;
      
      // Video එක මාරු කිරීම
      var bgVideo = document.getElementById('bgVideo');
      if (isMobile) {
          bgVideo.src = "images/bgmobile.webm"; 
      } else {
          bgVideo.src = "images/bg.webm"; 
      }
      
      // අභ්‍යන්තර ප්‍රමාණයන් (Internal Dimensions)
      // --- තිරයට ගැලපෙන සේ Canvas එකේ උස සහ Scale තීරණය කිරීම ---
      var scale = 1.0;
      if (isMobile) {
          h = ww * 1.4; 
          scale = 1.7; // ෆෝන් එක සඳහා
      } else {
          // Desktop වලදී Canvas එක තිරයේ උසට ගැලපෙන පරිදි සෑදීම
          h = wh * 0.95; // මුළු තිරයේ උසින් 95% ක් ගන්නවා (පළල මත පදනම් නොවී)
          scale = (wh / ww) * 0.6; // තිරයේ අනුපාතය (Ratio) අනුව තොරණ ලොකු කිරීම
          
          // තොරණ ඕනෑවට වඩා ලොකු වෙන එක පාලනය කිරීම
          if (scale > 1.3) scale = 1.3; 
          if (scale < 0.9) scale = 0.78;
      }
      
      var dpr = window.devicePixelRatio || 1; 
      
      // Auto-Fit කිරීම සඳහා CSS
      myCanvas.style.width = '100vw';
      myCanvas.style.height = '100vh';
      myCanvas.style.objectFit = 'contain';
      // ----------------------------------------
      
      myCanvas.width = w * dpr;
      myCanvas.height = h * dpr;
      
      context = myCanvas.getContext("2d");
      context.scale(dpr, dpr);

      function fullscreen() {
        var elem = document.documentElement; 
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { 
          elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) { 
          elem.msRequestFullscreen();
        }
      }
      myCanvas.addEventListener("click", fullscreen);

      marginTop = 0.1;
      marginBotom = 0.1;

      var k = 1.8 * Math.sqrt(2) - 1;
      
      r = (((1 - (marginTop + marginBotom)) / 4) * (1 / (k + 2)) * w) * scale;
      R = (k * r) * 1;

     cx[0] = w / 2;
      
      // --- ෆෝන් එකේ සහ Desktop එකේ තොරණ පිහිටන උස වෙනස් කිරීම ---
      if (isMobile) {
          // Mobile එකෙත් යටින් ඉඩ තියන්න තොරණ ටිකක් උඩට ගනී
          cy[0] = ((h / 2) * (1 + marginTop - marginBotom)) - (h * 0.05); 
      } else {
          // Desktop වලදී යට පින්තූරය නොකැපී පේන්න තොරණ තවත් ටිකක් උඩට ගනී
          cy[0] = (h / 2) - (h * 0.03); 
      }
      var gap = r * 0.5;
      var distanceToCenter = R + gap + r;
      

      for (var i = 0; i <= 7; i++) { cx[i + 1] = cx[0] + distanceToCenter * Math.sin(i * (Math.PI / 4)); }
      for (var i = 0; i <= 7; i++) { cy[i + 1] = cy[0] + distanceToCenter * Math.cos(i * (Math.PI / 4)); }

      pointSqx = cx[0] - (R + 3 * r);
      pointSqy = (cy[0] + r) + (distanceToCenter / Math.sqrt(2));
      dimPointSqx = 6 * r + 2 * R;
      dimPointSqy = 0.98 * h - pointSqy;

      // HTML එකෙන් බාගත කරගත් පින්තූර ලබා ගැනීම
      const downImage = document.getElementById("img-down");
      const imageCenter = document.getElementById("img-center");
      const image1 = document.getElementById("img-1");
      const image2 = document.getElementById("img-2");
      const image3 = document.getElementById("img-3");
      const image4 = document.getElementById("img-4");
      const image5 = document.getElementById("img-5");
      const image6 = document.getElementById("img-6");
      const image7 = document.getElementById("img-7");
      

      var dim = 2 * R * Math.sin(Math.atan(0.5));
      var makara_height = 152;
      var makara_width = makara_height * 2;

      imageBoxPadding = 0.01 * h;
      var d = (r - cy[1] + cy[8]) / r;
      angleBC = Math.acos(d);
      leftImgBoxStartX = pointSqx + imageBoxPadding;
      leftImgBoxStartY = pointSqy + imageBoxPadding;
      leftImageBoxH = dimPointSqy - 2 * imageBoxPadding;
      leftImageBoxW = R + 3 * r - r * Math.sin(angleBC) - 2 * imageBoxPadding;
      rightImgBoxStartX = cx[0] + r * Math.sin(angleBC) + imageBoxPadding;
      rightImgBoxStartY = cy[1] + r * Math.cos(angleBC) + imageBoxPadding;
      rightImgBoxH = leftImageBoxH;
      rightImgBoxW = leftImageBoxW;

      fractionOfDispSmall = 0.6;
      fractionOfDispLarge = 0.1;

      var dotSize = 0.003 * w;
      var dotSizeMedium = 0.75 * dotSize;
      var flowerCenterDotSize = 0.004 * w;

      var lightingModes = ["rainbowWave", "pulse", "colorBands", "chase", "meteor", "ripple", "gradientSpin", "solarFlare", "binaryTwinkle", "spiralOrbit", "breathingAurora", "neonTunnel", "glitchFlash", "plasmaRipple", "fireflyDance", "digitalRain", "galaxySwirl", "scannerSweep", "bubbleRise", "syncBlast"];
      var currentModeIndex = 0;
      setInterval(() => { currentModeIndex = (currentModeIndex + 1) % lightingModes.length; }, 10000);

      // 1. ඔයාට ඕන පිළිවෙල මෙතන තියෙනවා
      var sequencePatterns = ["rainbow", "buddhist_flag", "blocks", "wave", "pulse", "fire", "flash",  "spin", "alternate", "chase", "snake", "breathe"];

      updateRingPatternsSequentially();

      setInterval(updateRingPatternsSequentially, 6000);

            context.arc(x, y, dotSizeMedium * 1.2, 0, Math.PI * 2);

            context.closePath();
          }
        }
      };


      // =========================

      var filTriangle = function () {

        var fr = 0.1; // පරතරය

            for (var k = 0; k < dotNumbers[i4 + 3]; k++) {

      var centerCircleFlowerPattern = function () {

// අලුතින් boxList එකක් ලබා ගන්නවා
      var drawInnerCirclePattern = function (frameCount, time, boxList) {
        
        // boxList එකක් දුන්නොත් ඒ කොටු ටික විතරක් අඳිනවා. නැත්නම් ඔක්කොම අඳිනවා.
        let boxesToDraw = boxList ? boxList : [2, 3, 4, 5, 6, 7, 8];

          // කලින් තිබුණ 'for (var j = 2; j < cx.length; j++) {' වෙනුවට:
          for (var idx = 0; idx < boxesToDraw.length; idx++) {

            if (j === 1) continue;

              // රේඩියන් අගය අංශක (Degrees 0 - 360) වලට හරවා ගැනීම
              let angleInDegrees = angle * (180 / Math.PI); 
              let gap = 12; 

              // 2 වෙනි සහ 6 වෙනි කොටුවලට (j === 2 හෝ j === 6) පමණක් මෙය අදාළ කිරීම
              // if (j === 7) {
              //     if (

              //         (angleInDegrees > 226 - gap && angleInDegrees < 227 + gap)      
              //     ) {
              //         continue; // මේ කෝණ වල තිත් අඳින්න එපා
              //     }
              // }
              // ------------------------------------------------------------------
              

              let maxCosSin = Math.max(Math.abs(Math.cos(angle)), Math.abs(Math.sin(angle)));
              let localX = r * dotsForSmallCircle.radii[k] * (Math.cos(angle) / maxCosSin);
              let localY = r * dotsForSmallCircle.radii[k] * (Math.sin(angle) / maxCosSin);

              // දියමන්ති හැඩයට තියෙන කොටු (3, 5, 7) අංශක 45කින් කරකැවීම
              if (j === 3 || j === 5 || j === 7) {

              let color;
              let size = dotSizeMedium;

              // කලින් තිබුණ Animation ලයිට් patterns ටික එහෙම්මමයි
              // --- ලයිට් රටා (Patterns) ---
              switch (mode) {
                case "rainbow": 
                    color = `hsl(${(i * 360 / dotsForSmallCircle.numberOfDots[k] + frameCount * 2) % 360}, 100%, 60%)`;

                case "wave":

                case "chase": 
                    let distance = Math.abs(i - ((frameCount * 0.2) % dotsForSmallCircle.numberOfDots[k]));

                case "twinkle": 
                    color = Math.random() > 0.1 ? "rgba(255, 255, 255, 1)" : "rgba(200, 200, 255, 0.2)"; 
                    break;
                case "comet": 
                    let cometDist = Math.abs(i - ((frameCount * 0.3) % dotsForSmallCircle.numberOfDots[k])); 
                    color = cometDist < 8 ? `rgba(255, 255, 200, ${1 - (cometDist / 8)})` : "rgba(100, 100, 150, 0.1)"; 
                    break;
                
                // --- අලුතින් එකතු කළ තොරණ රටා ---
                
                // 1. මාරුවෙන් මාරුවට පත්තු වීම (රතු සහ කොළ)
                case "alternate": 
                    let isEven = i % 2 === 0;
                    let toggle = Math.floor(frameCount / 10) % 2 === 0;
                    color = (isEven === toggle) ? "rgba(255, 0, 0, 1)" : "rgba(0, 255, 0, 1)"; 
                    break;
                
                // 2. රවුමට කැරකෙන එළිය (කහ පාටින්)
                case "spin": 
                    let spinAngle = (i * 360 / dotsForSmallCircle.numberOfDots[k] - frameCount * 5) % 360;

                // 3. ගිනි දැල්ලක් වගේ නිවී නිවී පත්තු වීම (Fire Effect)
                case "fire": 
                    let fireHue = 10 + Math.random() * 30; // රතු, තැඹිලි සහ කහ මිශ්‍රණයක්

                    let flashColor = (k % 2 === 0) ? "0, 255, 255" : "255, 0, 255";

                    break;
                case "buddhist_flag": 
                    let b_colors = ["rgba(0, 51, 204, 1)", "rgba(255, 204, 0, 1)", "rgba(255, 0, 0, 1)", "rgba(255, 255, 255, 1)", "rgba(255, 102, 0, 1)"];
                    // තිත් 4න් 4ට පාට මාරු වී රවුමට කැරකෙයි
                    let b_idx = Math.floor((i + frameCount / 4) / 4) % 5;

                    break;

                    if (distToHead < s_length) {

                    } else {

                    // i සහ frameCount පදනම් කරගෙන random අගයක් හැදීම

      var centerCircleFillerPattern = function (frameCount, time) {

              case "ripple": let centerDist = Math.sqrt(Math.pow(dotX - cx[0], 2) + Math.pow(dotY - cy[0], 2)); let ripplePos = ((frameCount * 2) % 100) / 100 * R * 0.8; let rippleDist = Math.abs(centerDist - ripplePos); if (rippleDist < R * 0.1) { let intensity = 1 - rippleDist / (R * 0.1); color = `rgba(0, ${150 * intensity}, 255, ${intensity})`; } else { color = 'rgba(0, 50, 100, 0.2)'; } break;
              case "bubbleRise": let bubblePos = (frameCount * 0.4 + i4 * 10) % numberOfDotsEach.line[i4]; let dist = i3 - bubblePos; if (dist > -3 && dist < 0) { let intensity = 1 + dist / 3; color = `rgba(0, 255, 255, ${intensity})`; } else { color = 'rgba(10, 30, 50, 0.05)'; } break;

      let lineFrameCount = 0;
      function drawAnimatedDiagonalLine() {

          context.fillStyle = `rgba(204, 51, 255, ${opacity})`;
          context.arc(x, y, currentDotSize, 0, Math.PI * 2);
          context.fill();
          context.closePath();
        }
        lineFrameCount++;
      }

      var drawGapFillers = function (rayFrameCount) {
        var numRays = 16;
        var dotsPerRay = 8;
        var startR = R * 0.95;
        var endR = distanceToCenter - (r * 1.2);
        var stepR = (endR - startR) / dotsPerRay;

        for (var i = 0; i < numRays; i++) {
          var angle = (Math.PI * 2 / numRays) * i + (Math.PI / 16);
          for (var j = 0; j < dotsPerRay; j++) {
            var currentR = startR + (stepR * j);
            var dotX = cx[0] + currentR * Math.cos(angle);
            var dotY = cy[0] + currentR * Math.sin(angle);
            var phase = (rayFrameCount * 2 - j * 10) % 360;
            var hue = (i * 22.5 + rayFrameCount) % 360;
            var alpha = (Math.sin(phase * Math.PI / 180) + 1) / 2;

            context.beginPath();
            context.fillStyle = `hsla(${hue}, 100%, 60%, ${0.1 + alpha * 0.9})`;
            context.arc(dotX, dotY, dotSizeMedium * 1.5, 0, Math.PI * 2);
            context.fill();
            context.closePath();
          }
        }
      };

      // ==========================
      // NEW: Down Image Lights
      // ==========================
  // ==========================
      // NEW: Down Image Lights
      // ==========================
      var drawDownImageLights = function (frameCount) {
        var imgX = leftImgBoxStartX;
        var imgY = leftImgBoxStartY;
        var imgW = R * 2.01 + 6.05 * r - imageBoxPadding * 1;
        var imgH = rightImgBoxH;

        // පින්තූරයේ නියම අනුපාතයට (Responsive) ලයිට් රාමුවේ උස හැදීම
        if (downImage.complete && downImage.naturalWidth !== 0) {
            imgH = imgW / (downImage.naturalWidth / downImage.naturalHeight);
        }

        var numRows = 1; // ලයිට් පේළි ගණන
        var dotSpacing = dotSizeMedium * 0.3; // තිත් අතර පරතරය
        var rowGap = dotSizeMedium * 1; // පේළි අතර පරතරය
        
        // ... (Function එකේ ඉතුරු ටික වෙනස් කරන්න එපා, එහෙම්මම තියන්න) ...

        for (var row = 0; row < numRows; row++) {
          var offset = (row + 1) * rowGap;
          var rx = imgX - offset;
          var ry = imgY - offset;
          var rw = imgW + offset * 2;
          var rh = imgH + offset * 2;

          var perimeter = 2 * (rw + rh);
          var numDots = Math.floor(perimeter / dotSpacing);

          for (var i = 0; i < numDots; i++) {
            var currentDist = (i / numDots) * perimeter;
            var x, y;

            if (currentDist < rw) {
              x = rx + currentDist;
              y = ry;
            } else if (currentDist < rw + rh) {
              x = rx + rw;
              y = ry + (currentDist - rw);
            } else if (currentDist < 2 * rw + rh) {
              x = rx + rw - (currentDist - (rw + rh));
              y = ry + rh;
            } else {
              x = rx;
              y = ry + rh - (currentDist - (2 * rw + rh));
            }

            // Animation Pattern එක
            var hue = (frameCount * 2 + i * 5 + row * 40) % 200;
            
            // එක පැත්තකට දුවන ලයිට් එෆෙක්ට් එක (chasing effect)
            var chase = (frameCount + i * (row % 2 === 0 ? 1 : -1)) % 20;
            var alpha = chase < 10 ? 1.0 : 0.2; // එළිය අඩුවැඩි වීම
            var sizeMultiplier = chase < 10 ? 1.2 : 0.8; // සයිස් එක අඩුවැඩි වීම

            context.beginPath();
            context.fillStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
            context.arc(x, y, dotSizeMedium * sizeMultiplier, 0, Math.PI * 2, false);
            context.fill();
            context.closePath();
          }
        }
      };    

      // === MAIN ANIMATION LOOP ===
      let frameCount = 0;

      function mainAnimate() {
        context.clearRect(0, 0, w, h);
        let time = Date.now();

        // --- 1. කළු කොටු අඳින කෝඩ් එක (ලේසි වෙන්න ෆන්ක්ෂන් එකක් කරලා) ---
        function drawBlackBoxes(boxIndices) {
          for (let k = 0; k < boxIndices.length; k++) {
            let i = boxIndices[k];
            if (i === 1) continue;
            
            context.save();
            context.translate(cx[i], cy[i]);
            
            // Shadow Effects
            context.shadowColor = "rgba(0, 0, 0, 0.9)"; 
            //context.shadowBlur = 25; 
            context.shadowOffsetX = 0; 
            context.shadowOffsetY = 10; 

            context.beginPath();
            context.fillStyle = "rgba(0,0,0,1)";
            context.lineWidth = 5;
            
            if (i == 0) {
              context.arc(0, 0, R, Math.PI * 2, false);
              context.fill();
              
              // මැද බුදුරුව තියෙන රවුමට රන්වන් පැහැති 3D රාමුවක්
              context.lineWidth = 6;
              let centerGrad = context.createLinearGradient(-R, -R, R, R);
              centerGrad.addColorStop(0, "#FFDF00");
              centerGrad.addColorStop(0.5, "#B8860B");
              centerGrad.addColorStop(1, "#554300");
              context.strokeStyle = centerGrad;
              context.stroke();
              
            } else {
              context.save();
              if (i === 3 || i === 5 || i === 7) { 
                context.rotate(45 * Math.PI / 180); 
              }
              context.rect(-r, -r, r * 2, r * 2);
              context.fill();
              
              // --- අලුතින් එකතු කළ 3D Frame එක (කලු පාටින්) ---
              context.lineWidth = 8; // රාමුවේ ඝනකම
              
              // 3D පෙනුමක් එක්ක කලු පාට දීම
              let frameGrad = context.createLinearGradient(-r, -r, r, r);
              frameGrad.addColorStop(0, "#444444"); // උඩ කෙළවර (ටිකක් අළු පාටින් highlight එකට)
              frameGrad.addColorStop(0.3, "#000000"); // මැද කොටස සම්පූර්ණයෙන් කලු
              frameGrad.addColorStop(1, "#000000"); // පහළ කෙළවර සම්පූර්ණයෙන් කලු
              
              context.strokeStyle = frameGrad;
              context.strokeRect(-r, -r, r * 2, r * 2);
              // ------------------------------------
              
              context.restore(); 
            }
            
            context.shadowColor = "black"; 
            context.closePath();
            context.restore();
          }
        }

        // --- 2. අලුත් පිළිවෙලට ඇඳීම (Layering) ---
        
        // Layer A: යටින් තියෙන සාමාන්‍ය කොටු (Squares) සහ ඒවගේ ලයිට් මුලින්ම අඳින්න
        let bottomBoxes = [2, 4, 6, 8];
        drawBlackBoxes(bottomBoxes);
        drawInnerCirclePattern(frameCount, time, bottomBoxes);

        // Layer B: උඩින් තියෙන දියමන්ති කොටු (Diamonds) සහ ඒවගේ ලයිට් ඊටපස්සේ අඳින්න
        let topBoxes = [3, 5, 7]; // මෙතන 5 කියන්නේ ඔයාට උඩට ගන්න ඕන කරපු කොටුව
        drawBlackBoxes(topBoxes);
        drawInnerCirclePattern(frameCount, time, topBoxes);

        // Layer C: මැද ලොකු රවුම
        drawBlackBoxes([0]);

        // --- 3. Background අලංකරණ (අනිත් ලයිට් රටා) ---
        drawRadialDotGrid(frameCount);
        centerCircleFillerPattern(frameCount, performance.now());
        drawAnimatedDiagonalLine();
        drawGapFillers(frameCount);
        filTriangle();
        centerCircleFlowerPattern();
        drawDownImageLights(frameCount);

        // --- 4. පින්තූර (Images) ඇඳීම ---
        // 3. Draw Images (Only if they are loaded)
        if (downImage.complete && downImage.naturalWidth !== 0) {
          context.imageSmoothingEnabled = true;
          context.imageSmoothingQuality = 'high';
          
          // පින්තූරය ඇද වෙන්නේ නැතිව (Responsive) ඇඳීම
          let targetW = R * 2.01 + 6.05 * r - imageBoxPadding * 2;
          let targetH = targetW / (downImage.naturalWidth / downImage.naturalHeight);
          
          context.drawImage(downImage, leftImgBoxStartX, leftImgBoxStartY, targetW, targetH);
        }

        //if (imageMakaraleft.complete && imageMakaraleft.naturalWidth !== 0) context.drawImage(imageMakaraleft, pointSqx - makara_width, pointSqy, makara_width, makara_height);
        //if (imageMakaraRight.complete && imageMakaraRight.naturalWidth !== 0) context.drawImage(imageMakaraRight, pointSqx + dimPointSqx, pointSqy, makara_width, makara_height);

        if (image1.complete && image1.naturalWidth !== 0) context.drawImage(image1, cx[8] - r * fractionOfDispSmall, cy[8] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        //if (image2.complete && image2.naturalWidth !== 0) context.drawImage(image2, cx[7] - r * fractionOfDispSmall, cy[7] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        if (image3.complete && image3.naturalWidth !== 0) context.drawImage(image3, cx[6] - r * fractionOfDispSmall, cy[6] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        //if (image4.complete && image4.naturalWidth !== 0) context.drawImage(image4, cx[5] - r * fractionOfDispSmall, cy[5] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        if (image5.complete && image5.naturalWidth !== 0) context.drawImage(image5, cx[4] - r * fractionOfDispSmall, cy[4] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        //if (image6.complete && image6.naturalWidth !== 0) context.drawImage(image6, cx[3] - r * fractionOfDispSmall, cy[3] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
        if (image7.complete && image7.naturalWidth !== 0) context.drawImage(image7, cx[2] - r * fractionOfDispSmall, cy[2] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);

        // Draw Center Image (Buddha) last so it stays on top
        if (imageCenter.complete && imageCenter.naturalWidth !== 0) {
          context.drawImage(imageCenter, cx[0] - R * Math.sin(Math.PI / 6) - w * 0.00365, cy[0] - 0.021 * w, dim + 0.018 * w, dim + 0.015 * w);
        }

        frameCount++;
        requestAnimationFrame(mainAnimate);


        if (image1.complete && image1.naturalWidth !== 0) context.drawImage(image1, cx[8] - r * fractionOfDispSmall, cy[8] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);

        // Rotated Image 2
        if (image2.complete && image2.naturalWidth !== 0) {
          context.save();
          context.translate(cx[7], cy[7]);
          context.rotate(45 * Math.PI / 180);
          context.drawImage(image2, -r * fractionOfDispSmall, -r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
          context.restore();
        }

        if (image3.complete && image3.naturalWidth !== 0) context.drawImage(image3, cx[6] - r * fractionOfDispSmall, cy[6] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);

        // Rotated Image 4
        if (image4.complete && image4.naturalWidth !== 0) {
          context.save();
          context.translate(cx[5], cy[5]);
          context.rotate(45 * Math.PI / 180);
          context.drawImage(image4, -r * fractionOfDispSmall, -r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
          context.restore();
        }

        if (image5.complete && image5.naturalWidth !== 0) context.drawImage(image5, cx[4] - r * fractionOfDispSmall, cy[4] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);

        // Rotated Image 6
        if (image6.complete && image6.naturalWidth !== 0) {
          context.save();
          context.translate(cx[3], cy[3]);
          context.rotate(45 * Math.PI / 180);
          context.drawImage(image6, -r * fractionOfDispSmall, -r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
          context.restore();
        }

        if (image7.complete && image7.naturalWidth !== 0) context.drawImage(image7, cx[2] - r * fractionOfDispSmall, cy[2] - r * fractionOfDispSmall, fractionOfDispSmall * 2 * r, fractionOfDispSmall * 2 * r);
      }

      // Start the main loop
      mainAnimate();
    }
  </script>
