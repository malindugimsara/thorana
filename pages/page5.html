<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Story Page</title>

  <!-- Link to External CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Noto+Sans+Sinhala:wght@400;600&display=swap"
    rel="stylesheet">
</head>

<body>

  <div class="container1">

    <!-- Close Button -->
    <a href="../index.html" class="close-btn" title="Close">&#10006;</a>

    <div class="logo-header">
      <img src="../images/123.png" alt="Logo">
      <div class="main-title">ඉදිරිපත් කරන ඩිජිටල් තොරණ</div>
    </div>

    <div class="top-bar">
      <div class="views">5</div>
    </div>


    <div class="circle-wrapper">
      <div class="gif-border">
        <img src="../images/bor.gif" alt="">
      </div>
      <div class="circle-container" id="imageContainer">
        <img src="../images/a5.gif" alt="Story">
        <div class="play-button play" id="playBtn"></div>
      </div>
    </div>

    <audio id="storyAudio" src="../audio/5.mp3"></audio>

    <div class="buttons">
      <a href="page4.html"><button class="action-button">පෙර කොටුවට</button></a>
      <a href="page6.html"><button class="action-button">මීළඟ කොටුවට</button></a>
    </div>

    <!-- Divider added to separate content from social -->
    <div class="divider"></div>

    <!-- Social Media Icons (Using Font Awesome for consistency) -->
    <div class="social-share">
      <a href="https://www.facebook.com/athukoralagroup.lk/" class="social-icon fb" target="_blank">
        <i class="fab fa-facebook-f"></i>
      </a>
      <a href="https://athukoralagroup.com/" class="social-icon web" target="_blank">
        <i class="fas fa-globe"></i>
      </a>
    </div>

  </div>

  <script>
    const playButton = document.getElementById('playBtn');
    const audio = document.getElementById('storyAudio');
    const imageContainer = document.getElementById('imageContainer');

    playButton.addEventListener('click', (e) => {
      e.stopPropagation();
      audio.play();
      playButton.style.display = 'none';
    });

    imageContainer.addEventListener('click', () => {
      if (!audio.paused) {
        audio.pause();
        playButton.style.display = 'flex';
      }
    });

    audio.addEventListener('ended', () => {
      playButton.style.display = 'flex';
    });
  </script>

</body>

</html>
