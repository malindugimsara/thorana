<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Story Page</title>

  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>

  <!-- Link to External CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Noto+Sans+Sinhala:wght@400;600&display=swap"
    rel="stylesheet">

</head>

<body>

  <div class="particles" aria-hidden="true">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="container1">

    <a href="../index.html" class="close-btn" title="Close">&#10006;</a>

    <div class="logo-header">
      <div class="main-title">ATHUKORALA GROUP <br>
        <span class="sub-title">ඉදිරිපත් කරන ඩිජිටල් තොරණ</span>
      </div>
    </div>

    <div class="top-bar">
      <div class="views">2</div>
    </div>

    <div class="circle-wrapper">
      <div class="gif-border">
        <img src="../images/bor.gif" alt="Animated Border">
      </div>
      <div class="circle-container" id="imageContainer">
        <img src="../images/a2.gif" alt="Story Image">
        <div class="play-button play" id="playBtn"></div>
      </div>
    </div>

    <audio id="storyAudio" src="../audio/2.mp3"></audio>

    <div class="buttons">
      <a href="page1.html">
        <button class="action-button">පෙර කොටුවට</button>
      </a>
      <a href="page3.html">
        <button class="action-button">මීළඟ කොටුවට</button>
      </a>
    </div>

    <div class="divider"></div>

    <div class="social-share">
      <span class="contact-text">Follow us</span>

      <a href="https://www.facebook.com/athukoralagroup.lk/" class="social-icon fb" target="_blank"
        aria-label="Facebook">
        <i class="fab fa-facebook-f"></i>
      </a>

      <a href="https://athukoralagroup.com/" class="social-icon web" target="_blank" aria-label="Website">
        <i class="fas fa-globe"></i>
      </a>
    </div>

  </div>

  <script>
    const playButton = document.getElementById('playBtn');
    const audio = document.getElementById('storyAudio');
    const imageContainer = document.getElementById('imageContainer');

    playButton.addEventListener('click', (e) => {
      e.stopPropagation();
      audio.play();
      playButton.style.display = 'none';
    });

    imageContainer.addEventListener('click', () => {
      if (!audio.paused) {
        audio.pause();
        playButton.style.display = 'flex';
      }
    });

    audio.addEventListener('ended', () => {
      playButton.style.display = 'flex';
    });
  </script>

</body>

</html>
